name: Fast CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-verifier:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verifier and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Validate JSON Schemas
        run: python tools/validate_schemas.py

      - name: Validate unexecuted manifest template
        run: >-
          python tools/validate_schemas.py
          --schema experiment-manifest
          --instance _TEMPLATES/EXPERIMENT_MANIFEST_TEMPLATE.json

      - name: Run verifier unit, differential, and CLI tests
        run: >-
          python -m pytest -q
          tests/unit
          tests/differential
          tests/integration/test_verifier_cli.py

      - name: Check diff whitespace
        run: git diff --check

      - name: Ensure tests did not modify tracked files
        run: test -z "$(git status --porcelain --untracked-files=no)"

  cpp-upstream:
    name: C++17 ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verifier and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Verify preserved upstream inventory before build
        run: python tools/verify_upstream_snapshot.py

      - name: Configure CMake wrapper
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >-
          cmake -S . -B build/release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build CMake wrapper
        run: cmake --build build/release --target eg-upstream-serial --parallel 2

      - name: Build original Makefile in a copy and run bounded smoke tests
        run: python -m pytest -q tests/integration/test_upstream_build.py

      - name: Exercise benchmark runner and benchmark schema
        run: >-
          python tools/run_benchmark.py
          benchmarks/cases/upstream-small-k.json
          --output benchmarks/results/ci-upstream-serial-k3.json

      - name: Validate ephemeral benchmark result
        run: >-
          python tools/validate_schemas.py
          --schema benchmark-result
          --instance benchmarks/results/ci-upstream-serial-k3.json

      - name: Verify preserved upstream inventory after tests
        run: python tools/verify_upstream_snapshot.py

      - name: Reject tracked generated build products
        run: |
          if git ls-files | grep -E '(^|/)(build|out)/|\.(o|obj|a|so|dll|dylib|exe|pyc)$'; then
            echo "Generated build product is tracked."
            exit 1
          fi

      - name: Check diff whitespace
        run: git diff --check

      - name: Ensure checks did not modify tracked files
        run: test -z "$(git status --porcelain --untracked-files=no)"
