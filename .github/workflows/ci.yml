name: Fast CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  committed-range-whitespace:
    name: Check committed review range whitespace
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out full review history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Check committed review range whitespace
        run: >-
          python tools/check_review_range_whitespace.py
          --state REVIEW_STATE.yaml
          --head HEAD

      - name: Check immutable GitHub Action pins
        run: python tools/check_github_action_pins.py

  python-verifier:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verifier and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Validate JSON Schemas
        run: python tools/validate_schemas.py

      - name: Validate unexecuted manifest template
        run: >-
          python tools/validate_schemas.py
          --schema experiment-manifest
          --instance _TEMPLATES/EXPERIMENT_MANIFEST_TEMPLATE.json

      - name: Run verifier unit, differential, and CLI tests
        run: >-
          python -m pytest -q
          tests/unit
          tests/differential
          tests/integration/test_verifier_cli.py

      - name: Check test-created worktree whitespace
        run: git diff --check

      - name: Ensure tests did not modify tracked files
        run: test -z "$(git status --porcelain --untracked-files=no)"

  cpp-upstream:
    name: C++17 ${{ matrix.compiler }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verifier and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Verify preserved upstream inventory before build
        run: python tools/verify_upstream_snapshot.py

      - name: Configure CMake wrapper
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >-
          cmake -S . -B build/release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build CMake wrapper
        run: cmake --build build/release --target eg-upstream-serial --parallel 2

      - name: Build original Makefile in a copy and run bounded smoke tests
        env:
          EG_CANDIDATE_INSPECTION_TIMEOUT_SECONDS: "5"
          EG_SURPRISING_OUTCOME_DIR: artifacts/counterexamples/${{ matrix.compiler }}/tiny-upstream
        run: python -m pytest -q tests/integration/test_upstream_build.py

      - name: Exercise benchmark runner and enforce accepted outcome
        id: benchmark-runner
        run: >-
          python tools/run_benchmark.py
          benchmarks/cases/upstream-small-k.json
          --output benchmarks/results/ci-upstream-serial-k3.json

      - name: Validate ephemeral benchmark result even after runner failure
        if: ${{ always() && steps.benchmark-runner.outcome != 'skipped' }}
        shell: bash
        run: |
          result=benchmarks/results/ci-upstream-serial-k3.json
          if [[ ! -f "$result" ]]; then
            echo "::error file=$result::Benchmark runner executed but produced no result JSON."
            exit 1
          fi
          python tools/validate_schemas.py \
            --schema benchmark-result \
            --instance "$result"

      - name: Surface bounded benchmark diagnostics on failure
        if: ${{ failure() && steps.benchmark-runner.outcome != 'skipped' }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          prefix_limit = 16384
          paths = [
              Path("benchmarks/results/ci-upstream-serial-k3.json"),
              Path("benchmarks/results/ci-upstream-serial-k3.stdout.txt"),
              Path("benchmarks/results/ci-upstream-serial-k3.stderr.txt"),
          ]
          records = []
          for path in paths:
              if not path.is_file():
                  records.append({"exists": False, "path": path.as_posix()})
                  continue
              data = path.read_bytes()
              records.append(
                  {
                      "bytes": len(data),
                      "exists": True,
                      "path": path.as_posix(),
                      "prefix_limit_bytes": prefix_limit,
                      "prefix_utf8": data[:prefix_limit].decode(
                          "utf-8", errors="replace"
                      ),
                      "sha256": hashlib.sha256(data).hexdigest(),
                      "truncated": len(data) > prefix_limit,
                  }
              )
          print(
              json.dumps(
                  {"benchmark_failure_artifacts": records},
                  ensure_ascii=True,
                  sort_keys=True,
              )
          )
          PY

      - name: Verify preserved upstream inventory after tests
        if: ${{ always() }}
        run: python tools/verify_upstream_snapshot.py

      - name: Reject tracked generated build products
        if: ${{ always() }}
        run: |
          if git ls-files | grep -E '(^|/)(build|out)/|\.(o|obj|a|so|dll|dylib|exe|pyc)$'; then
            echo "Generated build product is tracked."
            exit 1
          fi

      - name: Check test-created worktree whitespace
        if: ${{ always() }}
        run: git diff --check

      - name: Ensure checks did not modify tracked files
        if: ${{ always() }}
        run: test -z "$(git status --porcelain --untracked-files=no)"

      - name: Upload complete tiny outcome artifacts after failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tiny-outcomes-${{ matrix.compiler }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/counterexamples/
          if-no-files-found: warn
          include-hidden-files: false

      - name: Upload complete benchmark artifacts after failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-results-${{ matrix.compiler }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: benchmarks/results/
          if-no-files-found: warn
          include-hidden-files: false
